  description_seo: "Elevage professionnel Coeur de Clayton de Berger Americain Miniature a Frangy (74270), Haute-Savoie. Chiots LOF, socialisation avancee, lignee therapeutique depuis 2014."
  description_hero: "Un elevage professionnel ne de l'amour inconditionnel pour cette race depuis 2014"
  description_about: |
    Mon elevage est ne de l'amour inconditionnel pour cette race en 2014. Mon objectif est de participer a l'amelioration de la race en selectionnant les meilleurs sujets, qu'ils soient issus d'un pedigree francais ou americain, ainsi que de travailler plus considerablement sur la sociabilisation.

    Je travaille sur une lignee de chiens d'aide a la personne et therapeutique, de ce fait je selectionne mes reproducteurs de temperaments reflechi, sachant se poser (pas d'hyperactivite) mais toujours pret a suivre et faire plaisir, en travaillant des le plus jeune age leur confiance en eux et la gestion de leurs emotions.

    Mon elevage evolue avec 3 interets : le temps accorde a chaque chien, une sociabilisation des chiots consciencieuse, et une selection des reproducteurs rigoureuse.

