reproducteurs:
  - prenom: "Arya"
    sexe: "femelle"
    role: "Mère · Reproductrice"
    sexe_symbole: "♀"
    photo: "https://res.cloudinary.com/dhwukxhgc/image/upload/q_auto/f_auto/brayden-prato-CfGjX3yeYbY-unsplash_oguyq5.jpg"
    description: "Arya est le cœur de notre élevage. Berger Australien d'une sensibilité et d'une intelligence remarquables, elle transmet à ses chiots son tempérament équilibré et sa joie de vivre. Ses résultats de dépistage dysplasie (hanches et coudes) sont exemplaires."
  - prenom: "Yankee"
    sexe: "male"
    role: "Père · Reproducteur"
    sexe_symbole: "♂"
    photo: "https://res.cloudinary.com/dhwukxhgc/image/upload/q_auto/f_auto/brayden-prato-XTti5PmvSE0-unsplash_bxwqlv.jpg"
    description: "Yankee apporte à nos portées sa robustesse et son énergie positive. Vif, joueur, doté d'un solide instinct de travail et d'un attachement profond pour sa famille, il est le complément idéal d'Arya. Dépistage dysplasie complet et favorable."

temoignages:
  - texte: "Notre bleu merle Odin est arrivé parfaitement socialisé — curieux, confiant, déjà familiarisé avec les enfants et les autres chiens. L'élevage Du Bois de Chantalouette nous a accompagnés avec une bienveillance et une disponibilité exceptionnelles."
    auteur: "Claire &amp; Romain D."
    chiot: "Berger Australien bleu merle · Grenoble"
    avatar: "https://picsum.photos/80/80?random=40"
  - texte: "Je pratique le canicross en compétition et je cherchais un partenaire d'exception. Yankee m'a orienté vers une femelle rouge merle — c'est une athlète née, mais aussi la plus affectueuse des compagnes de vie. Un élevage sérieux, passionné, honnête."
    auteur: "Thomas L."
    chiot: "Berger Australien rouge merle · Vizille"
    avatar: "https://picsum.photos/80/80?random=41"
  - texte: "Nous étions une famille sans expérience de la race. L'élevage a pris le temps de nous conseiller, vérifier que le Berger Australien nous correspondait vraiment, puis nous guider. Notre noir tri Pixel est une merveille de chiot — intelligent, joyeux, et déjà en cours d'agility !"
    auteur: "Famille Martin"
    chiot: "Berger Australien noir tri · Chambéry"
    avatar: "https://picsum.photos/80/80?random=42"