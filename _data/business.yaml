# Informations de ton entreprise — Modifie ce fichier avec tes vraies données
# Utilise par le generateur de devis/facture

business:
  nom: "TON NOM"
  prenom: "Ton Prenom"
  siren: "TON_SIRET"
  tva_intra: "FR00_000_000_000"  # optionnel, "TVA non applicable" si micro
  adresse: "Ton adresse"
  code_postal: "00000"
  ville: "Ta ville"
  email: "ton@email.com"
  telephone: "06 00 00 00 00"
  statut: "Micro-entrepreneur"  # ou "Auto-entrepreneur", "SASU", etc.
  regime_tva: "non-redevable"   # "non-redevable" ou "assujetti"
  taux_tva: 0                   # 0 si non-redevable, 20 si assujetti

# Paramètres par defaut des devis
defaults:
  delai_paiement: 30  # jours
  validite_devis: 30  # jours
  conditions_paiement: "Virement bancaire"
  iban: "FR00 0000 0000 0000 0000 0000 000"
  bic: "XXXXXXXXX"

# Prix des prestations (ajuste selon tes tarifs)
prestations:
  site_vitrine_base:
    nom: "Site vitrine elevage canin - Formule de base"
    description: "Site 1 page, responsive, hebergement GitHub Pages, photo, contact, formulaire"
    prix_ht: 500
  site_vitrine_complet:
    nom: "Site vitrine elevage canin - Formule complete"
    description: "Site 5 pages, responsive, galerie photos, temoignages, contact, SEO, hebergement 1 an"
    prix_ht: 1200
  site_vitrine_premium:
    nom: "Site vitrine elevage canin - Formule Premium"
